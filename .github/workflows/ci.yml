name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gameapi
          POSTGRES_PASSWORD: gameapi
          POSTGRES_DB: gameapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          API_KEY: dummy-key
          DATABASE_URL: postgresql+asyncpg://gameapi:gameapi@localhost:5432/gameapi_test
          TEST_DATABASE_URL: postgresql+asyncpg://gameapi:gameapi@localhost:5432/gameapi_test
        run: uv run pytest -v
